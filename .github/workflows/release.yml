name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

# ─────────────────────────────────────────────────────────────────────────────
# Job: build-test
#   Runs the full test suite on all 3 platforms.
#   All publish jobs depend on this passing.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore NexusMonitor.sln

      - name: Build
        run: dotnet build NexusMonitor.sln --configuration Release

      - name: Test
        run: dotnet test NexusMonitor.sln --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

# ─────────────────────────────────────────────────────────────────────────────
# Job: build-windows
#   Publishes win-x64 and win-arm64.
#   Produces: ZIPs (portable) + Inno Setup EXEs (installer).
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    needs: build-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish win-x64
        run: >
          dotnet publish src/NexusMonitor.UI/NexusMonitor.UI.csproj
          -p:PublishProfile=win-x64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish win-arm64
        run: >
          dotnet publish src/NexusMonitor.UI/NexusMonitor.UI.csproj
          -p:PublishProfile=win-arm64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish CLI win-x64
        run: >
          dotnet publish src/NexusMonitor.CLI/NexusMonitor.CLI.csproj
          -p:PublishProfile=cli-win-x64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish CLI win-arm64
        run: >
          dotnet publish src/NexusMonitor.CLI/NexusMonitor.CLI.csproj
          -p:PublishProfile=cli-win-arm64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Create portable ZIP archives
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path src/NexusMonitor.UI/publish/win-x64/* `
            -DestinationPath "dist/NexusMonitor-Windows-Portable-$v.zip"
          Compress-Archive -Path src/NexusMonitor.UI/publish/win-arm64/* `
            -DestinationPath "dist/NexusMonitor-Windows-ARM-Portable-$v.zip"
          Compress-Archive -Path src/NexusMonitor.CLI/publish/cli-win-x64/* `
            -DestinationPath "dist/NexusCLI-Windows-$v.zip"
          Compress-Archive -Path src/NexusMonitor.CLI/publish/cli-win-arm64/* `
            -DestinationPath "dist/NexusCLI-Windows-ARM-$v.zip"

      - name: Build installers (Inno Setup)
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.VERSION }}"
          # Inno Setup is pre-installed on windows-latest — find iscc.exe
          $iscc = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            $iscc = Get-Item "C:\Program Files (x86)\Inno Setup*\iscc.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $iscc) {
            Write-Host "Inno Setup not found — installing via Chocolatey..."
            choco install innosetup -y --no-progress
            $iscc = Get-Item "C:\Program Files (x86)\Inno Setup*\iscc.exe" | Select-Object -First 1
          }
          $isccPath = if ($iscc -is [System.IO.FileInfo]) { $iscc.FullName } else { $iscc.Source }
          Write-Host "Using iscc: $isccPath"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $isccPath installer\windows\NexusMonitor.iss `
            /DAppVersion=$v /DAppArch=x64 `
            "/DPublishDir=..\..\src\NexusMonitor.UI\publish\win-x64" `
            /DOutputDir=..\..\dist `
            "/DOutputFilename=NexusMonitor-Windows-Installer-$v"
          & $isccPath installer\windows\NexusMonitor.iss `
            /DAppVersion=$v /DAppArch=arm64 `
            "/DPublishDir=..\..\src\NexusMonitor.UI\publish\win-arm64" `
            /DOutputDir=..\..\dist `
            "/DOutputFilename=NexusMonitor-Windows-ARM-Installer-$v"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/

# ─────────────────────────────────────────────────────────────────────────────
# Job: build-macos
#   Publishes osx-x64 and osx-arm64.
#   Produces: tar.gz (portable) + .dmg (installer).
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    needs: build-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish osx-arm64
        run: >
          dotnet publish src/NexusMonitor.UI/NexusMonitor.UI.csproj
          -p:PublishProfile=osx-arm64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish osx-x64
        run: >
          dotnet publish src/NexusMonitor.UI/NexusMonitor.UI.csproj
          -p:PublishProfile=osx-x64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish CLI osx-arm64
        run: >
          dotnet publish src/NexusMonitor.CLI/NexusMonitor.CLI.csproj
          -p:PublishProfile=cli-osx-arm64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish CLI osx-x64
        run: >
          dotnet publish src/NexusMonitor.CLI/NexusMonitor.CLI.csproj
          -p:PublishProfile=cli-osx-x64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: List macOS publish output (debug)
        run: |
          echo "=== osx-arm64 ===" && find src/NexusMonitor.UI/publish/osx-arm64 -maxdepth 3 2>/dev/null | head -30 || echo "(not found)"
          echo "=== osx-x64 ===" && find src/NexusMonitor.UI/publish/osx-x64 -maxdepth 3 2>/dev/null | head -30 || echo "(not found)"

      - name: Build .dmg and .tar.gz packages
        run: |
          mkdir -p dist
          bash installer/macos/create-app-bundle.sh osx-arm64 ${{ steps.ver.outputs.VERSION }} dist
          bash installer/macos/create-app-bundle.sh osx-x64 ${{ steps.ver.outputs.VERSION }} dist
          V="${{ steps.ver.outputs.VERSION }}"
          tar -czf "dist/NexusCLI-MacOS-${V}.tar.gz" \
            -C src/NexusMonitor.CLI/publish/cli-osx-arm64 .
          tar -czf "dist/NexusCLI-MacOS-Intel-${V}.tar.gz" \
            -C src/NexusMonitor.CLI/publish/cli-osx-x64 .

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/

# ─────────────────────────────────────────────────────────────────────────────
# Job: build-linux
#   Publishes linux-x64 and linux-arm64.
#   Produces: tar.gz (portable) + AppImage + .deb (x64 only).
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish linux-x64
        run: >
          dotnet publish src/NexusMonitor.UI/NexusMonitor.UI.csproj
          -p:PublishProfile=linux-x64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish linux-arm64
        run: >
          dotnet publish src/NexusMonitor.UI/NexusMonitor.UI.csproj
          -p:PublishProfile=linux-arm64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish CLI linux-x64
        run: >
          dotnet publish src/NexusMonitor.CLI/NexusMonitor.CLI.csproj
          -p:PublishProfile=cli-linux-x64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Publish CLI linux-arm64
        run: >
          dotnet publish src/NexusMonitor.CLI/NexusMonitor.CLI.csproj
          -p:PublishProfile=cli-linux-arm64
          -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Create portable tar.gz archives
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dist
          tar -czf "dist/NexusMonitor-Linux-Portable-${V}.tar.gz" \
            -C src/NexusMonitor.UI/publish/linux-x64 .
          tar -czf "dist/NexusMonitor-Linux-ARM-Portable-${V}.tar.gz" \
            -C src/NexusMonitor.UI/publish/linux-arm64 .
          tar -czf "dist/NexusCLI-Linux-${V}.tar.gz" \
            -C src/NexusMonitor.CLI/publish/cli-linux-x64 .
          tar -czf "dist/NexusCLI-Linux-ARM-${V}.tar.gz" \
            -C src/NexusMonitor.CLI/publish/cli-linux-arm64 .

      - name: Build AppImage (x64)
        run: bash installer/linux/create-appimage.sh ${{ steps.ver.outputs.VERSION }} dist

      - name: Build .deb (x64)
        run: bash installer/linux/create-deb.sh ${{ steps.ver.outputs.VERSION }} dist

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/

# ─────────────────────────────────────────────────────────────────────────────
# Job: create-release
#   Downloads all platform artifacts and creates the GitHub Release.
# ─────────────────────────────────────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets
          pattern: "*-artifacts"

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Nexus System Monitor $GITHUB_REF_NAME" \
            --generate-notes \
            $(find release-assets -maxdepth 1 -type f | sort | tr '\n' ' ')
